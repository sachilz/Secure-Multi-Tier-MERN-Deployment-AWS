services:
  server:
    build:
      context: ./server
    container_name: project01-server
    image: todo-app-server
    restart: unless-stopped
    env_file:
      - ./server/.env

  client:
    build:
      context: ./client
    container_name: project01-client
    image: todo-app-client
    restart: unless-stopped
    depends_on:
      - server

  nginx:
    image: nginx:1.27-alpine
    container_name: project01-nginx
    restart: unless-stopped
    ports:
    - "80:80"
    volumes:
      - ./client/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server